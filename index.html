<!-- Profile Page View အပိုင်းထဲတွင် ဤကုတ်ကို အစားထိုးထည့်သွင်းပါသည် -->
<div id="view-profile" class="view-panel" style="text-align: center;">
    <h3 style="margin-top: 20px;">My Verified Profile</h3>
    <p style="color: #666; font-size: 13px;">Status: Active & Secured 🛡️</p>
    
    <!-- 📸 ဆရာကြီး အကြံပြုထားသော Selfie ကင်မရာ Area -->
    <div style="margin: 20px auto; width: 200px; height: 200px; border-radius: 50%; border: 4px solid var(--primary-color); overflow: hidden; background: #eee; position: relative;">
        <video id="webcamVideo" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none;"></video>
        <canvas id="capturedCanvas" style="width: 100%; height: 100%; object-fit: cover; display: none;"></canvas>
        <div id="camPlaceholder" style="padding-top: 80px; color: #aaa; font-size: 14px;">ဓာတ်ပုံမရှိသေးပါ</div>
    </div>

    <button class="feature-btn" style="width: 80%; background: #4caf50;" onclick="window.loveCamera.startCamera()">📷 ကင်မရာ ဖွင့်ရန်</button>
    <button class="feature-btn" style="width: 80%; background: #2196f3; display:none;" id="snapBtn" onclick="window.loveCamera.takeSnapshot()">📸 Selfie ရိုက်မည် (Filter Active)</button>
    
    <!-- 🚪 အကောင့်ထွက်ခြင်း ခလုတ် -->
    <button class="feature-btn logout-btn" style="width: 80%;" onclick="window.loveAuth.logoutAccount()">🚪 အကောင့်မှထွက်ရန် (Logout)</button>
</div>

<script>
// JavaScript အပိုင်းထဲတွင် အောက်ပါ Camera Module ကို ထည့်သွင်းထားပါသည်
window.loveCamera = {
    streamObj: null,
    startCamera: function() {
        const video = document.getElementById('webcamVideo');
        const placeholder = document.getElementById('camPlaceholder');
        const snapBtn = document.getElementById('snapBtn');
        const canvas = document.getElementById('capturedCanvas');

        canvas.style.display = 'none';
        placeholder.style.display = 'none';
        video.style.display = 'block';

        // ဖုန်း သို့မဟုတ် ကွန်ပျူတာ၏ ရှေ့ကင်မရာကို လှမ်းခေါ်ခြင်း
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
        .then(function(stream) {
            window.loveCamera.streamObj = stream;
            video.srcObject = stream;
            snapBtn.style.display = 'inline-block';
        })
        .catch(function(err) {
            alert("❌ ကင်မရာဖွင့်ခွင့် မရရှိပါ သို့မဟုတ် ကင်မရာ မရှိပါဗျာ။");
            placeholder.style.display = 'block';
            video.style.display = 'none';
        });
    },
    takeSnapshot: function() {
        const video = document.getElementById('webcamVideo');
        const canvas = document.getElementById('capturedCanvas');
        const snapBtn = document.getElementById('snapBtn');
        const context = canvas.getContext('2d');

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // 🌟 Natural Beauty Filter (Brightness & Contrast Effect မြှင့်တင်ခြင်း)
        context.filter = "brightness(1.08) contrast(1.02) saturate(1.05)";
        
        // ကင်မရာထဲက ပုံရိပ်ကို Canvas ပေါ် ဆွဲတင်လိုက်ခြင်း
        context.translate(canvas.width, 0);
        context.scale(-1, 1); // မျက်နှာပြန်လှန်ပေးခြင်း (Mirror Effect)
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        // ကင်မရာ ပြန်ပိတ်ခြင်း
        if(this.streamObj) {
            this.streamObj.getTracks().forEach(track => track.stop());
        }

        video.style.display = 'none';
        canvas.style.display = 'block';
        snapBtn.style.display = 'none';
        alert("✨ Selfie ဓာတ်ပုံကို လုံုံခြုံစွာ မှတ်တမ်းတင်ပြီးပါပြီ (Beauty Filter သက်ရောက်ထားပါသည်)။");
    }
};
    </script>
